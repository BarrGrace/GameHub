services:
  mysql:
    image: mysql:8
    container_name: gamehub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gamehub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: gamehub-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/gamehub
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data: